version: '3.9'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - NODE_ENV=production

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - api
